<div class="list-container">
  <div class="list-header">
    <h2>Gestion des Évaluations</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Nouvelle Évaluation
    </button>
  </div>
  <mat-card>
    <div class="loading" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
    <table mat-table [dataSource]="evaluations" *ngIf="!isLoading">

      <ng-container matColumnDef="stage">
        <th mat-header-cell *matHeaderCellDef>Stage</th>
        <td mat-cell *matCellDef="let e">{{ e.stageSujet ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="encadrant">
        <th mat-header-cell *matHeaderCellDef>Encadrant</th>
        <td mat-cell *matCellDef="let e">{{ e.encadrantNom ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="note">
        <th mat-header-cell *matHeaderCellDef>Note</th>
        <td mat-cell *matCellDef="let e">
          <span class="badge" [class]="getNoteColor(e.note)">{{ e.note }}/20</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let e">
          <span class="badge blue">{{ e.typeEvaluation }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="dateEval">
        <th mat-header-cell *matHeaderCellDef>Date</th>
        <td mat-cell *matCellDef="let e">{{ e.dateEval | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let e">
          <button mat-icon-button color="primary" (click)="openForm(e)" matTooltip="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(e.id)" matTooltip="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="6">Aucune évaluation trouvée</td>
      </tr>
    </table>
  </mat-card>
</div>
