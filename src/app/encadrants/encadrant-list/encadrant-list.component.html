<div class="list-container">
  <div class="list-header">
    <h2>Gestion des Encadrants</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Nouvel Encadrant
    </button>
  </div>
  <mat-card>
    <div class="loading" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
    <table mat-table [dataSource]="encadrants" *ngIf="!isLoading">

      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom & Prénom</th>
        <td mat-cell *matCellDef="let e">
          <div class="name-cell">
            <div class="avatar">{{ e.nom[0] }}{{ e.prenom[0] }}</div>
            <span>{{ e.nom }} {{ e.prenom }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let e">{{ e.email }}</td>
      </ng-container>

      <ng-container matColumnDef="fonction">
        <th mat-header-cell *matHeaderCellDef>Fonction</th>
        <td mat-cell *matCellDef="let e">{{ e.fonction ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="departement">
        <th mat-header-cell *matHeaderCellDef>Département</th>
        <td mat-cell *matCellDef="let e">
          <span class="badge" *ngIf="e.departementNom">{{ e.departementNom }}</span>
          <span *ngIf="!e.departementNom">—</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let e">
          <button mat-icon-button color="primary" (click)="openForm(e)" matTooltip="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(e.id)" matTooltip="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="5">Aucun encadrant trouvé</td>
      </tr>
    </table>
  </mat-card>
</div>
