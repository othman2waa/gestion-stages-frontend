<div class="dashboard">
  <h2 class="page-title">Tableau de Bord</h2>

  <!-- KPI Cards -->
  <div class="stats-grid">
    <mat-card class="stat-card blue">
      <mat-icon>school</mat-icon>
      <div class="stat-info">
        <span class="stat-number">{{ stats?.totalStagiaires ?? 0 }}</span>
        <span class="stat-label">Stagiaires</span>
      </div>
    </mat-card>
    <mat-card class="stat-card green">
      <mat-icon>work</mat-icon>
      <div class="stat-info">
        <span class="stat-number">{{ stats?.totalStages ?? 0 }}</span>
        <span class="stat-label">Stages</span>
      </div>
    </mat-card>
    <mat-card class="stat-card orange">
      <mat-icon>description</mat-icon>
      <div class="stat-info">
        <span class="stat-number">{{ stats?.totalConventions ?? 0 }}</span>
        <span class="stat-label">Conventions</span>
      </div>
    </mat-card>
    <mat-card class="stat-card purple">
      <mat-icon>star_rate</mat-icon>
      <div class="stat-info">
        <span class="stat-number">{{ stats?.totalEvaluations ?? 0 }}</span>
        <span class="stat-label">Évaluations</span>
      </div>
    </mat-card>
  </div>

  <!-- Charts Row -->
  <div class="charts-grid">
    <!-- Donut statuts -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Statut des Stages</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas #statutChart></canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Bar types -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>Stages par Type</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas #typeChart></canvas>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Horizontal bar départements -->
    <mat-card class="chart-card chart-wide">
      <mat-card-header>
        <mat-card-title>Stages par Département</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-wrapper">
          <canvas #deptChart></canvas>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
