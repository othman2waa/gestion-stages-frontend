<div class="list-container">
  <div class="list-header">
    <h2>Gestion des Conventions</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Nouvelle Convention
    </button>
  </div>
  <mat-card>
    <div class="loading" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
    <table mat-table [dataSource]="conventions" *ngIf="!isLoading">

      <ng-container matColumnDef="numero">
        <th mat-header-cell *matHeaderCellDef>Numéro</th>
        <td mat-cell *matCellDef="let c"><strong>{{ c.numero ?? '—' }}</strong></td>
      </ng-container>

      <ng-container matColumnDef="stage">
        <th mat-header-cell *matHeaderCellDef>Stage</th>
        <td mat-cell *matCellDef="let c">{{ c.stageSujet ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="statut">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let c">
          <span class="badge" [class]="getStatutColor(c.statut)">{{ c.statut }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="dateEmission">
        <th mat-header-cell *matHeaderCellDef>Date d'Émission</th>
        <td mat-cell *matCellDef="let c">{{ c.dateEmission | date:'dd/MM/yyyy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary" (click)="openForm(c)" matTooltip="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(c.id)" matTooltip="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="5">Aucune convention trouvée</td>
      </tr>
    </table>
  </mat-card>
</div>
