<h2 mat-dialog-title>
  <mat-icon>{{ isEdit ? 'edit' : 'add' }}</mat-icon>
  {{ isEdit ? 'Modifier Convention' : 'Nouvelle Convention' }}
</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="form-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Stage</mat-label>
      <mat-select formControlName="stageId">
        <mat-option *ngFor="let s of stages" [value]="s.id">{{ s.sujet }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Numéro</mat-label>
      <input matInput formControlName="numero" placeholder="CONV-2026-001">
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Statut</mat-label>
      <mat-select formControlName="statut">
        <mat-option *ngFor="let s of statuts" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Date d'Émission</mat-label>
      <input matInput [matDatepicker]="picker" formControlName="dateEmission">
      <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-datepicker #picker></mat-datepicker>
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="form.invalid || isLoading">
    <mat-spinner diameter="18" *ngIf="isLoading"></mat-spinner>
    <span *ngIf="!isLoading">{{ isEdit ? 'Modifier' : 'Créer' }}</span>
  </button>
</mat-dialog-actions>
