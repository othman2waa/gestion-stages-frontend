<div class="list-container">
  <div class="list-header">
    <h2>Gestion des Stagiaires</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Nouveau Stagiaire
    </button>
  </div>

  <mat-card>
    <!-- Search -->
    <div class="search-bar">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Rechercher</mat-label>
        <input matInput [(ngModel)]="searchKeyword" (input)="onSearch()"
               placeholder="Nom, prénom...">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    <!-- Loading -->
    <div class="loading" *ngIf="isLoading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>

    <!-- Table -->
    <table mat-table [dataSource]="filteredStagiaires" *ngIf="!isLoading" class="w-full">

      <ng-container matColumnDef="nom">
        <th mat-header-cell *matHeaderCellDef>Nom & Prénom</th>
        <td mat-cell *matCellDef="let s">
          <div class="name-cell">
            <div class="avatar">{{ s.nom[0] }}{{ s.prenom[0] }}</div>
            <span>{{ s.nom }} {{ s.prenom }}</span>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let s">{{ s.email }}</td>
      </ng-container>

      <ng-container matColumnDef="cin">
        <th mat-header-cell *matHeaderCellDef>CIN</th>
        <td mat-cell *matCellDef="let s">{{ s.cin }}</td>
      </ng-container>

      <ng-container matColumnDef="filiere">
        <th mat-header-cell *matHeaderCellDef>Filière</th>
        <td mat-cell *matCellDef="let s">{{ s.filiere }}</td>
      </ng-container>

      <ng-container matColumnDef="niveau">
        <th mat-header-cell *matHeaderCellDef>Niveau</th>
        <td mat-cell *matCellDef="let s">
          <span class="badge">{{ s.niveau }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="etablissement">
        <th mat-header-cell *matHeaderCellDef>Établissement</th>
        <td mat-cell *matCellDef="let s">{{ s.etablissementNom ?? '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" (click)="openForm(s)" matTooltip="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(s.id)" matTooltip="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="7">Aucun stagiaire trouvé</td>
      </tr>
    </table>
  </mat-card>
</div>
