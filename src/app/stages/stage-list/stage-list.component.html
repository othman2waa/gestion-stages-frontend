<div class="list-container">
  <div class="list-header">
    <h2>Gestion des Stages</h2>
    <button mat-raised-button color="primary" (click)="openForm()">
      <mat-icon>add</mat-icon> Nouveau Stage
    </button>
  </div>
  <mat-card>
    <div class="loading" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>
    <table mat-table [dataSource]="stages" *ngIf="!isLoading">
      <ng-container matColumnDef="sujet">
        <th mat-header-cell *matHeaderCellDef>Sujet</th>
        <td mat-cell *matCellDef="let s"><strong>{{ s.sujet }}</strong></td>
      </ng-container>
      <ng-container matColumnDef="stagiaire">
        <th mat-header-cell *matHeaderCellDef>Stagiaire</th>
        <td mat-cell *matCellDef="let s">{{ s.stagiaireNom ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="encadrant">
        <th mat-header-cell *matHeaderCellDef>Encadrant</th>
        <td mat-cell *matCellDef="let s">{{ s.encadrantNom ?? '—' }}</td>
      </ng-container>
      <ng-container matColumnDef="type">
        <th mat-header-cell *matHeaderCellDef>Type</th>
        <td mat-cell *matCellDef="let s">
          <span class="badge blue">{{ s.typeStage }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="statut">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let s">
          <span class="badge" [class]="getStatutColor(s.statut)">{{ s.statut }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="dates">
        <th mat-header-cell *matHeaderCellDef>Période</th>
        <td mat-cell *matCellDef="let s">
          {{ s.dateDebut | date:'dd/MM/yyyy' }} → {{ s.dateFin | date:'dd/MM/yyyy' }}
        </td>
      </ng-container>
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" (click)="openForm(s)" matTooltip="Modifier">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(s.id)" matTooltip="Supprimer">
            <mat-icon>delete</mat-icon>
          </button>
          <button mat-icon-button color="accent"
            [routerLink]="['/stages', s.id, 'workflow']"
            matTooltip="Workflow">
            <mat-icon>timeline</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" colspan="7">Aucun stage trouvé</td>
      </tr>
    </table>
  </mat-card>
</div>
